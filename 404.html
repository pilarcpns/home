<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halaman Tidak Ditemukan — PilarCPNS</title>
  <meta name="theme-color" content="#F5F1E9" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="dist/output.css" />
  <link rel="icon" type="image/png" href="assets/favicon-32.png" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #F5F1E9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .error-code {
      font-size: 120px;
      font-weight: 800;
      color: #1B4332;
      line-height: 1;
      margin-bottom: 8px;
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      color: #1B4332;
      margin-bottom: 12px;
    }
    .desc {
      font-size: 16px;
      color: #555;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      background: #1B4332;
      color: #fff;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #2D6A4F;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="error-code">404</div>
    <h1 class="title">Halaman Tidak Ditemukan</h1>
    <p class="desc">Halaman yang kamu cari tidak ada atau sudah dipindahkan. Kembali ke beranda untuk mulai belajar.</p>
    <a href="/" class="btn">Kembali ke Beranda</a>
  </div>
</body>
</html>
